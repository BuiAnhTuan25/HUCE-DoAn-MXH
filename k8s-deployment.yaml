apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-service
  namespace: default            
  labels:
    app: social-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-service
  template:
    metadata:
      labels:
        app: social-service
    spec:
      containers:
        - name: social-service
          image: buianhtuan25/social-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: social-service-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: social-service
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080